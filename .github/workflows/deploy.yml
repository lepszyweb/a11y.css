name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main-pl
      - "!dependabot/**"
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - main-pl
      - "!dependabot/**"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build
          npm run docs
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

